name: Refresh Trend Cache

on:
  schedule:
    - cron: '0 9 * * *'   # Every day at 9 AM UTC = 3 AM CST
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytrends requests

      - name: Fetch trends and write cache
        run: python scripts/fetch_trends.py

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/trends.json cache/keywords.json
          git diff --cached --quiet || git commit -m "chore: refresh trend cache [skip ci]"
          git push
